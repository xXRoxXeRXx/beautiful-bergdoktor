version: 2
updates:

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Python (pip) dependencies for web/
  - package-ecosystem: "pip"
    directory: "/web"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
