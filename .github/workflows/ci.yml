name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Python syntax check
      run: |
        python -m py_compile notifyDoctolibDoctorsAppointment.py
        echo "✅ Python syntax check passed"

    - name: Test Docker build
      run: |
        docker build -t bergdoktorbot-test .
        echo "✅ Docker build successful"

    - name: Test Docker run
      run: |
        docker run --rm \
          -e RUN_MODE=manual \
          -e TELEGRAM_BOT_TOKEN=dummy_token \
          -e TELEGRAM_CHAT_ID=dummy_chat \
          bergdoktorbot-test \
          python -c "
          import os
          print('✅ Container starts successfully')
          print('Python version:', __import__('sys').version)
          print('Env vars loaded:', bool(os.getenv('TELEGRAM_BOT_TOKEN')))
          "
