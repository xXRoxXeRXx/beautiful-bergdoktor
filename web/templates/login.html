<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BergdoktorBot – Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo { font-size: 3rem; text-align: center; margin-bottom: 0.5rem; }
        h1 { color: #f1f5f9; text-align: center; font-size: 1.4rem; margin-bottom: 0.25rem; }
        .subtitle { color: #64748b; text-align: center; font-size: 0.85rem; margin-bottom: 2rem; }
        label { display: block; color: #94a3b8; font-size: 0.8rem; font-weight: 600;
                text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
        input {
            width: 100%; padding: 0.75rem 1rem;
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            color: #f1f5f9; font-size: 0.95rem; margin-bottom: 1.25rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        button {
            width: 100%; padding: 0.85rem;
            background: #3b82f6; color: white; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        .alert {
            background: #450a0a; border: 1px solid #991b1b; color: #fca5a5;
            border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🏥</div>
        <h1>BergdoktorBot</h1>
        <p class="subtitle">Dashboard Login</p>

        {% for msg in get_flashed_messages() %}
        <div class="alert">⚠️ {{ msg }}</div>
        {% endfor %}

        <form method="POST">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>

            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>

            <button type="submit">Anmelden →</button>
        </form>
    </div>
</body>
</html>
